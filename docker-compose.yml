version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: electromall_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: electromall
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: electromall_vendors
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U electromall -d electromall_vendors"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
