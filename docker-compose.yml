version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: electromall_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: electromall
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: electromall_vendors
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U electromall -d electromall_vendors"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: electromall_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://electromall:${POSTGRES_PASSWORD:-secret}@postgres:5432/electromall_vendors
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
